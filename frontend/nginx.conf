# Serves the compiled React static build. Falls back to index.html for any
# unmatched path so client-side routing (if added later) still works.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets aggressively; index.html is left uncached
    # (default) so new deploys are picked up immediately.
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
