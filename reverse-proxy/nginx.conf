# ---------------------------------------------------------------------------
# Example nginx config for hosting AgentCord on a single domain with HTTPS.
#
# This sits IN FRONT of the two containers from docker-compose.yml (or two
# processes managed by PM2 — see ecosystem.config.js) and routes:
#   /            -> frontend (React static build)
#   /api/*       -> backend REST API
#   /ws          -> backend WebSocket endpoint (note the Upgrade headers)
#
# Usage on a fresh Ubuntu VPS:
#   1. sudo apt install nginx certbot python3-certbot-nginx
#   2. Copy this file to /etc/nginx/sites-available/agentcord
#   3. sudo ln -s /etc/nginx/sites-available/agentcord /etc/nginx/sites-enabled/
#   4. Replace "your-domain.com" below with your real domain
#   5. sudo nginx -t && sudo systemctl reload nginx
#   6. sudo certbot --nginx -d your-domain.com   (auto-configures HTTPS + renewal)
# ---------------------------------------------------------------------------

server {
    listen 80;
    server_name your-domain.com;

    # --- Frontend: served as static files (or proxied to the frontend
    #     container on port 8080 if using docker-compose.yml as-is) ---
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- REST API ---
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- WebSocket endpoint — requires the Upgrade/Connection headers
    #     below, or the real-time connection will fail to establish ---
    location /ws {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;   # keep long-lived WS connections alive
    }
}

# After running `certbot --nginx`, it will automatically add a second
# `server { listen 443 ssl; ... }` block above with your certificates and
# redirect this HTTP block to HTTPS. No manual SSL config needed.
